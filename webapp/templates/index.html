<html>
<head>
    <title>System Toolkit</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <h1>System Toolkit</h1>

    <h2>Linux System Information</h2>
    <pre>{{sysinfo}}</pre>

    <h2>Device Configuration Outputs</h2>
    {% for name in configs %}
    <h3>{{name}}</h3>
    <pre>{{configs[name]}}</pre>
    {% endfor %}
</body>
</html>
